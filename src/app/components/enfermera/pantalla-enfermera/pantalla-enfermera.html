<div class="enfermera-layout">
    <nav class="sidebar">
        <div class="brand-section">
            <div class="logo-box">
                <img src="/logo.png" alt="Logo Nova Salud" class="logo-placeholder">
            </div>
            <h2>Nova Salud</h2>
            <span class="role-badge">ENFERMERÍA</span>
        </div>

        <ul class="nav-links">
            <li>
                <a routerLink="/panel/enfermeria/sala-espera" routerLinkActive="active"
                    [routerLinkActiveOptions]="{ exact: true }">
                    <i class="pi pi-users"></i>
                    <span>Sala de Espera</span>
                </a>
            </li>

            <li>
                <a class="triage-link" [class.active]="estaEnTriage()"
                    [attr.aria-current]="estaEnTriage() ? 'page' : null" tabindex="-1">
                    <i class="pi pi-heart"></i>
                    <span>Atención y Triaje</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="main-area">
        <header class="top-navbar">
            <div class="nav-title">
                <h3>Panel de Control de Enfermería</h3>
            </div>

            <button class="btn-logout" (click)="logout()">
                <i class="pi pi-sign-out"></i>
                Salir
            </button>
        </header>

        <main class="content-wrapper">
            <div class="dashboard-header">
                <h2>Hola, {{ nombreEnfermera() }}</h2>
                <p>Gestiona el triaje, registro de signos vitales y la cola de espera desde aquí.</p>
            </div>

            <div class="dashboard-body">
                <router-outlet></router-outlet>
            </div>
        </main>
    </div>
</div>
